name: Image metadata
description: Composite action for generating container image metadata
author: Digdir Platform Team

inputs:
  image-name:
    description: Container image name without registry. If unset, the repository name is used.
    default: ""
    required: false
  container-registry:
    description: Container registry host (e.g. creiddev.azurecr.io or ghcr.io).
    default: ""
    required: false
  registry-url:
    description: Alternate registry URL if container-registry is not provided.
    default: ""
    required: false
  image-tag:
    description: Custom image tag. If set, this is used instead of auto-generation.
    default: ""
    required: false
  package-version:
    description: Package version used as image tag when provided.
    default: ""
    required: false
  version:
    description: Version string used as image tag when provided.
    default: ""
    required: false
  version-pom-path:
    description: Maven pom.xml path used to derive image tag when version is not provided.
    default: ""
    required: false
  strip-snapshot:
    description: Strip '-SNAPSHOT' from version when building from main or tag refs.
    default: "false"
    required: false
  auto-generate-tag:
    description: Whether an image tag should be auto-generated when no explicit tag is provided.
    default: "true"
    required: false

outputs:
  image-name:
    description: The fully qualified image name
    value: ${{ steps.image-metadata.outputs.image-name }}
  image-tag:
    description: The image tag
    value: ${{ steps.image-metadata.outputs.image-tag }}

runs:
  using: composite
  steps:
    - name: Start image metadata
      shell: bash
      run: |
        echo "### Image metadata" >> "$GITHUB_STEP_SUMMARY"

    - name: Determine image name
      shell: bash
      env:
        REPOSITORY_NAME: ${{ env.REPOSITORY_NAME }}
      run: |
        registry="${{ inputs.container-registry }}"
        if [ -z "$registry" ]; then
          registry="${{ inputs.registry-url }}"
        fi

        if [ -z "$registry" ]; then
          echo "::error:: Missing container-registry or registry-url input."
          echo "> [!WARNING]"
          echo "> **Input validation failed:** You must provide either container-registry or registry-url." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

        image_name="${{ inputs.image-name }}"
        if [ -z "$image_name" ]; then
          if [ -n "$REPOSITORY_NAME" ]; then
            image_name="$REPOSITORY_NAME"
          else
            image_name="${{ github.event.repository.name }}"
          fi
        fi

        if [ "$registry" = "ghcr.io" ]; then
          image_name="$registry/${{ github.repository_owner }}/$image_name"
        else
          image_name="$registry/$image_name"
        fi

        echo "image-name=$image_name" >> "$GITHUB_OUTPUT"
        echo "- Image name: $image_name" >> "$GITHUB_STEP_SUMMARY"

    - name: Determine image tag
      shell: bash
      run: |
        if [ -n "${{ inputs.image-tag }}" ]; then
          image_tag="${{ inputs.image-tag }}"
          echo "- Using custom image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
        elif [ -n "${{ inputs.package-version }}" ]; then
          image_tag="${{ inputs.package-version }}"
          echo "- Using package version as image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
        elif [ -n "${{ inputs.version }}" ]; then
          image_tag="${{ inputs.version }}"
          echo "- Using provided version as image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
        elif [ -n "${{ inputs.version-pom-path }}" ]; then
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -f "${{ inputs.version-pom-path }}" 2>/dev/null || true)
          if [ -n "$VERSION" ] && [ "$VERSION" != "null" ]; then
            image_tag="$VERSION"
            if [[ "${{ inputs.strip-snapshot }}" == "true" ]] && ([[ "$GITHUB_REF" == "refs/heads/main" ]] || [[ "$GITHUB_REF" =~ ^refs/tags/ ]]); then
              image_tag="${image_tag/-SNAPSHOT/}"
            fi
            echo "- Using Maven version as image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
          else
            image_tag=$(date +'%Y-%m-%d-%H%M')-${GITHUB_SHA::8}
            echo "- Fallback auto-generated image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
          fi
        elif [[ "${{ inputs.auto-generate-tag }}" == "true" ]]; then
          image_tag=$(date +'%Y-%m-%d-%H%M')-${GITHUB_SHA::8}
          echo "- Auto-generated image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "::error:: No image tag available. Provide image-tag, package-version, version, or allow auto-generate-tag."
          echo "> [!WARNING]"
          echo "> **Input validation failed:** No image tag was provided and auto-generate-tag is disabled." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

        echo "image-tag=$image_tag" >> "$GITHUB_OUTPUT"
        echo "- Image tag: $image_tag" >> "$GITHUB_STEP_SUMMARY"
