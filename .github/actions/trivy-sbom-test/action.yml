name: Trivy SBOM Test
description: Composite action for generating SBOMs using Trivy (supports both filesystem and image scanning)
author: Digdir Platform Team

inputs:
  sbom-scan-type:
    description: "Type of scan ('fs' for filesystem, 'image' for container image)"
    required: true
  sbom-path:
    description: "Path to scan (required when scan-type is 'fs')"
    required: false
  sbom-image-ref:
    description: "Image reference to scan (required when scan-type is 'image')"
    required: false
  sbom-format:
    description: "Output format ('github', 'cyclonedx', 'spdx', 'spdx-json')"
    default: "github"
    required: false
  sbom-artifact-name:
    description: "Name for the artifact (will be sanitized for filename)"
    required: true
  sbom-upload-artifact:
    description: "Whether to upload the SBOM as a GitHub artifact"
    default: "true"
    required: false
  sbom-skip-setup:
    description: "Skip Trivy setup if it has already been run in a previous step"
    default: "false"
    required: false
  sbom-trivy-version:
    description: "Version of Trivy to use"
    default: "0.35.0"
    required: false

runs:
  using: composite
  steps:
    - name: Start Trivy SBOM generation
      shell: bash
      run: |
        echo "### Trivy SBOM generation (${{ inputs.sbom-scan-type }})" >> "$GITHUB_STEP_SUMMARY"

    - name: Write inputs to summary
      uses: felleslosninger/github-workflows/.github/actions/json-to-summary@main
      with:
        json-payload: ${{ toJson(inputs) }}

    - name: Validate inputs
      shell: bash
      run: |
        if [[ "${{ inputs.sbom-scan-type }}" != "fs" && "${{ inputs.sbom-scan-type }}" != "image" ]]; then
          echo "::error::Invalid scan-type: must be 'fs' or 'image'"
          exit 1
        fi

        if [[ "${{ inputs.sbom-scan-type }}" == "fs" && -z "${{ inputs.sbom-path }}" ]]; then
          echo "::error::path is required when scan-type is 'fs'"
          exit 1
        fi

        if [[ "${{ inputs.sbom-scan-type }}" == "image" && -z "${{ inputs.sbom-image-ref }}" ]]; then
          echo "::error::image-ref is required when scan-type is 'image'"
          exit 1
        fi

    - name: Prepare SBOM filename
      id: meta
      shell: bash
      run: |
        # Sanitize artifact name: replace slashes/dots/spaces with dashes
        SAFE_NAME=$(echo "${{ inputs.sbom-artifact-name }}" | tr '/. ' '-')

        # Determine extension based on format
        case "${{ inputs.sbom-format }}" in
          "spdx")
            EXT="spdx"
            ;;
          "cyclonedx"|"spdx-json")
            EXT="json"
            ;;
          "github"|*)
            EXT="json"
            ;;
        esac

        FILENAME="sbom-${SAFE_NAME}.${EXT}"
        echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
        echo "Artifact filename: $FILENAME" >> "$GITHUB_STEP_SUMMARY"

    - name: Run Trivy SBOM generation (filesystem)
      if: ${{ inputs.sbom-scan-type == 'fs' }}
      id: trivy-gen-fs
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      env:
        TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2,public.ecr.aws/aquasecurity/trivy-db:2
        TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1,public.ecr.aws/aquasecurity/trivy-java-db:1
      with:
        version: ${{ inputs.sbom-trivy-version }}
        scan-type: 'fs'
        format: ${{ inputs.sbom-format }}
        scan-ref: ${{ inputs.sbom-path }}
        output: ${{ steps.meta.outputs.filename }}
        github-pat: ${{ github.token }}
        skip-setup-trivy: ${{ inputs.sbom-skip-setup }}

    - name: Run Trivy SBOM generation (image)
      if: ${{ inputs.sbom-scan-type == 'image' }}
      id: trivy-gen-image
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      env:
        TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db:2,public.ecr.aws/aquasecurity/trivy-db:2
        TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db:1,public.ecr.aws/aquasecurity/trivy-java-db:1
      with:
        version: ${{ inputs.sbom-trivy-version }}
        scan-type: 'image'
        format: ${{ inputs.sbom-format }}
        image-ref: ${{ inputs.sbom-image-ref }}
        output: ${{ steps.meta.outputs.filename }}
        github-pat: ${{ github.token }}
        skip-setup-trivy: ${{ inputs.sbom-skip-setup }}

    - name: Publish Trivy status to summary
      if: always()
      shell: bash
      env:
        OUTCOME_FS: ${{ steps.trivy-gen-fs.outcome }}
        OUTCOME_IMAGE: ${{ steps.trivy-gen-image.outcome }}
        FILENAME: ${{ steps.meta.outputs.filename }}
        SCAN_TYPE: ${{ inputs.sbom-scan-type }}
      run: |
        if [[ "$SCAN_TYPE" == "fs" ]]; then
          OUTCOME="$OUTCOME_FS"
        else
          OUTCOME="$OUTCOME_IMAGE"
        fi

        if [[ "$OUTCOME" == "success" ]]; then
          echo "> [!SUCCESS]"
          echo "> **SBOM generated:** \`$FILENAME\`"
        else
          echo "> [!WARNING]"
          echo "> **SBOM generation failed:** Check the Trivy logs for details."
        fi >> "$GITHUB_STEP_SUMMARY"

    - name: Upload SBOM artifact
      if: ${{ inputs.sbom-upload-artifact == 'true' && (steps.trivy-gen-fs.outcome == 'success' || steps.trivy-gen-image.outcome == 'success') }}
      id: upload
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ steps.meta.outputs.filename }}
        path: ${{ steps.meta.outputs.filename }}
        retention-days: 14

    - name: Publish upload status to summary
      if: ${{ always() && inputs.sbom-upload-artifact == 'true' }}
      shell: bash
      env:
        OUTCOME: ${{ steps.upload.outcome }}
      run: |
        if [[ "$OUTCOME" == "success" ]]; then
          echo "- :white_check_mark: Artifact successfully uploaded to GitHub."
        else
          echo "- :x: Artifact upload failed or was skipped due to generation error."
        fi >> "$GITHUB_STEP_SUMMARY"
