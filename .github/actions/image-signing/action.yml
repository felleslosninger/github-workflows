name: Image signing
description: Composite action for image signing using Cosign
author: Digdir Platform Team

inputs:
  image:
    description: Valid image string for signing
    required: true

runs:
  using: composite
  steps:
    - name: Log image signing inputs
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
      run: |
        {
          echo "### Image signing"

          echo "#### Image signing inputs"
          echo "| Key                 | Value |"
          echo "| ------------------- | ----- |"
          echo "| image | $IMAGE |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Install Cosign
      uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # pin@v3.10.1

    - name: Extract metadata from image input
      id: set-signing-metadata
      shell: bash
      env:
        IMAGE: ${{ inputs.image }}
      run: |
        # Get digest from image inspection
        TARGET_IMAGE=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")

        if [[ -z "$TARGET_IMAGE" ]]; then
          echo "::error title=Could not resolve repo digest::Could not resolve RepoDigest for $IMAGE. The image might not be pushed to a registry yet."
          exit 1
        fi

        # Extract pure digest
        IMAGE_DIGEST="${TARGET_IMAGE##*sha256:}"

        # Extract subject name from input
        # Strip potential digest to leave subject name and potential tag
        SUBJECT_NAME_TAG="${IMAGE%%@*}"

        # Strip tag to leave subject name
        SUBJECT_NAME="${SUBJECT_NAME_TAG%:*}"

        # Set outputs
        echo "image-digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"
        echo "subject-name=$SUBJECT_NAME" >> "$GITHUB_OUTPUT"

        # Set env. vars
        echo "TARGET_IMAGE=$TARGET_IMAGE" >> "$GITHUB_ENV"

        {
          echo "#### Extracted image signing metadata"
          echo "| Key                 | Value |"
          echo "| ------------------- | ----- |"
          echo "| Target image | $TARGET_IMAGE |"
          echo "| Digest | $IMAGE_DIGEST |"
          echo "| Subject | $SUBJECT_NAME |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Generate provenance metadata
      shell: bash
      env:
        SUBJECT_NAME: ${{ steps.set-signing-metadata.outputs.subject-name }}
        IMAGE_DIGEST: ${{ steps.set-signing-metadata.outputs.image-digest }}
        COMMIT_SHA: ${{ github.sha }}
        ACTOR: ${{ github.actor }}
        JOB: ${{ github.job }}
        REPO_OWNER_ID: ${{ github.repository_owner_id }}
        WORKFLOW_REF: ${{ github.workflow_ref }}
        RUN_ID: ${{ github.run_id }}
        REPO: ${{ github.repository }}
      run: |
        # Generate according to spec https://slsa.dev/spec/v1.0/provenance
        # Using jq ensures all variables are safely JSON-escaped
        STARTED_ON=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

        jq -n \
          --arg subject "$SUBJECT_NAME" \
          --arg digest "$IMAGE_DIGEST" \
          --arg image "$TARGET_IMAGE" \
          --arg commit "$COMMIT_SHA" \
          --arg author "$ACTOR" \
          --arg job "$JOB" \
          --arg ownerId "$REPO_OWNER_ID" \
          --arg builder "$WORKFLOW_REF" \
          --arg runId "$RUN_ID" \
          --arg repo "$REPO" \
          --arg startedOn "$STARTED_ON" \
          '{
            "_type": "https://slsa.dev/provenance/v1",
            "subject": [
              {
                "name": $subject,
                "digest": {
                  "sha256": $digest
                }
              }
            ],
            "buildDefinition": {
              "buildType": "https://github.com/github-actions/build",
              "externalParameters": {
                "image": $image,
                "commit": $commit,
                "author": $author,
                "job": $job,
                "repositoryOwnerId": $ownerId
              }
            },
            "runDetails": {
              "builder": {
                "id": $builder
              },
              "metadata": {
                "invocationId": $runId,
                "startedOn": $startedOn
              }
            },
            "materials": [
              {
                "uri": ("git+https://github.com/" + $repo + ".git"),
                "digest": {
                  "sha1": $commit
                }
              }
            ]
          }' > ./provenance.json

    - name: Sign and attest the image
      shell: bash
      run: |
        echo "Signing image..."
        cosign sign --yes "$TARGET_IMAGE"

        echo "Attesting provenance..."
        cosign attest --yes --predicate ./provenance.json --type slsaprovenance1 "$TARGET_IMAGE"

        {
          echo "#### Cosign tree output"
          echo '```console'
          cosign tree "$TARGET_IMAGE"
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
