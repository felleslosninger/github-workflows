name: Release to github packages

on:
  workflow_call:
    inputs:
      java-version:
        description: Main version of java
        default: "11"
        required: false
        type: string
      java-distribution:
        description: Java distribution to use
        default: "liberica"
        required: false
        type: string
      sbom-path:
        description: Target directory for SBOM generation
        default: ./target/
        required: false
        type: string
      profile:
        description: Maven profile to use
        required: false
        type: string
      package-version:
        description: Version to use for maven package
        default: ""
        required: false
        type: string
      deployment-repository:
        description: Set deployment repo
        default: ""
        required: false
        type: string
      artifact-name:
        required: false
        type: string
      setup-npm-auth:
        description: Configure private NPM registry authentication
        default: false
        required: false
        type: boolean
      cache-path:
        default: "**/pom.xml"
        required: false
        type: string
      fetch-depth:
        description: Fetch depth
        default: 1
        required: false
        type: number
      application-path:
        default: "./"
        required: false
        type: string
      trivy-library-disable-scan:
        description: Disable Trivy library scan
        type: boolean
        required: false
        default: false
      trivy-library-ignore-unfixed:
        description: Ignore unfixed vulnerabilities in Trivy library scan
        type: boolean
        required: false
        default: true
      trivy-library-severity:
        description: When to fail the scan with Trivy library vulnerabilities
        type: string
        required: false
        default: 'HIGH,CRITICAL'
      trivy-library-hide-progress:
        description: Hide progress output for Trivy library scan
        type: boolean
        required: false
        default: false
      trivy-version:
        description: Version of Trivy to use for scanning
        type: string
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # pin@v5.0.0
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # pin@v5.2.0
        with:
          distribution: "${{ inputs.java-distribution }}"
          java-version: ${{ inputs.java-version }}
          cache: maven
          cache-dependency-path: ${{ inputs.cache-path }}

      - name: Configure private NPM registry authentication
        if: ${{ inputs.setup-npm-auth == true }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # pin@v5.0.0
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@felleslosninger'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set m2 settings to read organization packages
        run: |
          mkdir -p ~/.m2
          echo "<settings><servers><server><id>github</id><username>${{ secrets.GH_PACKAGES_READ_USER }}</username><password>${{ secrets.GH_PACKAGES_READ_PAT }}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Set version
        run: |
          if [ "${{ inputs.package-version }}" != "" ]; then
            mvn versions:set -B -DnewVersion="${{ inputs.package-version }}"
            echo "- \`mvn versions\` was executed" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- \`mvn versions\` was not executed" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Maven install
        run: |
          if [ -n "${{ inputs.profile }}" ]; then
            mvn -B clean install --update-snapshots -P"${{ inputs.profile }}"
          else
            mvn -B clean install --update-snapshots
          fi

      - name: Run Trivy vulnerability scanner
        uses: felleslosninger/github-workflows/.github/actions/trivy-scan@main
        with:
          scan-type: "fs"
          application-path: ${{ inputs.application-path }}
          library-disable-scan: ${{ inputs.trivy-library-disable-scan }}
          library-ignore-unfixed: ${{ inputs.trivy-library-ignore-unfixed }}
          library-severity: ${{ inputs.trivy-library-severity }}
          library-hide-progress: ${{ inputs.trivy-library-hide-progress }}
          trivy-version: ${{ inputs.trivy-version }}

      - name: Overwrite m2 settings to publish libs
        run: |
          echo "<settings><servers><server><id>github</id><username>${{ github.actor }}</username><password>${{ github.token }}</password></server></servers></settings>" > ~/.m2/settings.xml

      - name: Maven deploy
        run: |
          MAVEN_CMD="mvn -B deploy"

          if [ "${{ inputs.profile }}" != "" ]; then
            MAVEN_CMD="$MAVEN_CMD -P${{ inputs.profile }}"
          fi

          if [ "${{ inputs.deployment-repository }}" != "" ]; then
            MAVEN_CMD="$MAVEN_CMD -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ inputs.deployment-repository }}"
          fi

          cd ${{ inputs.application-path }} # Move into module path if multi module project, default is "./" so no operation if not specified.

          $MAVEN_CMD

      - name: Set artifact id
        id: set-artifact-id
        run: |
          echo "artifact-id=${{ inputs.artifact-name }}-${{ github.run_number }}-${{ github.run_attempt }}.spdx" >> "$GITHUB_OUTPUT"

      - uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # pin@v0.20.6
        with:
          path: ${{ inputs.sbom-path }}
          artifact-name: ${{ steps.set-artifact-id.outputs.artifact-id }}
