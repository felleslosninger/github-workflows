# Workflow Name: Build and publish container image
#
# Owner: Digdir Platform team
#
# Purpose:
#   This is the proxy workflow for the golden path for container image builds
#   after a commit to main. This workflow will trigger the corresponding Spring
#   Boot, Quarkus, or generic Docker build and publish workflow based on the
#   'application-type' input. It will also run input checks to determine the
#   container registry to publish to based on the 'cr-type' and 'lifecycle'
#   inputs.
#
#   Flow:
#     1. Input checks
#     2. Trigger Spring Boot, Quarkus, or Docker build and publish workflow
#        based on 'application-type' input
#
# Trigger:
#   Triggered by workflow calls (workflow_call)
#
# Inputs:
#   See input section
#
# Outputs:
#   See output section
#

name: Build and publish container image

permissions: {}

on:
  workflow_call:
    inputs:
      image-name:
        description: Name of container image
        required: false
        type: string
      image-pack:
        description: Paketo builder image to use. See https://paketo.io/docs/reference/builders-reference/ for choices
        default: builder-noble-java-tiny
        required: false
        type: string
      image-pack-tag:
        description: Docker image pack version tag
        default: "latest"
        required: false
        type: string
      image-signing:
        description: Flag to toggle image signing
        default: true
        required: false
        type: boolean
      image-tag:
        description: Custom image tag, if not provided a tag will be auto-generated
        default: ""
        required: false
        type: string
      java-version:
        description: Main version of java
        default: "11"
        required: false
        type: string
      java-distribution:
        description: Java distribution to use
        default: "liberica"
        required: false
        type: string
      slack-channel-id:
        description: Team channel id
        default: ""
        required: false
        type: string
      application-path:
        description: Path to the application to build, relative to the repository root
        default: "./"
        required: false
        type: string
      cache-path:
        description: Path to cache dependencies, relative to the repository root
        default: "**/pom.xml"
        required: false
        type: string
      update-versions:
        description: Whether to update versions of dependencies in pom.xml before building (only applies to Spring Boot applications)
        default: "true"
        required: false
        type: string
      application-type:
        description: Type of application to build. Supported values are 'spring-boot', 'quarkus', and 'docker'. This will determine which build workflow to trigger
        default: "spring-boot"
        required: false
        type: string
      add-git-package-token:
        description: Flag to toggle adding Git package token to the build environment variables, which is required for accessing private repositories when building Docker images. Only applies to 'docker' application type
        default: false
        required: false
        type: boolean
      native:
        description: Whether to build a native image (only applies to Quarkus applications)
        default: false
        required: false
        type: boolean
      lifecycle:
        description: Lifecycle environment to determine container registry to publish to. Supported values are 'deployment' and 'development'. This will determine the container registry and credentials used for publishing the image
        required: false
        default: "deployment"
        type: string
      cr-type:
        description: Container registry type. Supported values are 'acr' and 'ghcr'. This will determine the container registry to publish to, with 'acr' publishing to Azure Container Registry and 'ghcr' publishing to GitHub Container Registry
        required: false
        default: "acr"
        type: string
      module-name:
        description: Module name to build (for multi-module projects)
        required: false
        type: string
      trivy-library-disable-scan:
        description: Disable Trivy library scan
        type: boolean
        required: false
        default: false
      trivy-library-ignore-unfixed:
        description: Ignore unfixed vulnerabilities in Trivy library scan
        type: boolean
        required: false
        default: true
      trivy-library-severity:
        description: When to fail the scan with Trivy library vulnerabilities
        type: string
        required: false
        default: 'HIGH,CRITICAL'
      trivy-os-disable-scan:
        description: Disable Trivy OS scan
        type: boolean
        required: false
        default: false
      trivy-os-ignore-unfixed:
        description: Ignore unfixed vulnerabilities in Trivy OS scan
        type: boolean
        required: false
        default: true
      trivy-os-severity:
        description: When to fail the scan with Trivy OS vulnerabilities
        type: string
        required: false
        default: 'CRITICAL'
      trivy-version:
        description: Version of Trivy to use for scanning
        type: string
        required: false
        default: ''

    outputs:
      image-version:
        description: "Docker image version"
        value: ${{ jobs.run-spring-boot-build.outputs.image-version || jobs.run-quarkus-build.outputs.image-version || jobs.run-docker-build.outputs.image-version }}
      image-digest:
        description: "Docker image SHA256 digest"
        value: ${{ jobs.run-spring-boot-build.outputs.image-digest || jobs.run-quarkus-build.outputs.image-digest || jobs.run-docker-build.outputs.image-digest }}

jobs:
  inputs-to-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Write inputs to summary
        uses: felleslosninger/github-workflows/.github/actions/json-to-summary@main
        with:
          json-payload: ${{ toJson(inputs) }}

  input-checks:
    runs-on: ubuntu-latest
    outputs:
      container-registry: ${{ steps.set-container-registry.outputs.container-registry }}
      sp-container-registry-client-id: ${{ steps.set-container-registry.outputs.sp-container-registry-client-id }}

    steps:
      - name: Check for supported application-type
        id: application-type-check
        run: |
          if [[ ${{ inputs.application-type }} != "spring-boot" && ${{ inputs.application-type }} != "quarkus" && ${{ inputs.application-type }} != "docker" ]]; then
            echo "Invalid application type. Supported types are: \`spring-boot\`, \`quarkus\` and \`docker\`" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Set container registry
        id: set-container-registry
        run: |
          if [[ "${{ inputs.cr-type }}" == "ghcr" ]]; then
            echo "container-registry=ghcr.io" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.lifecycle }}" == "deployment" ]]; then
            echo "sp-container-registry-client-id=AZURE_CLIENT_ID" >> "$GITHUB_OUTPUT"
            echo "container-registry=${{ vars.CR_DEPLOYMENT_URL }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ inputs.lifecycle }}" == "development" ]]; then
            echo "sp-container-registry-client-id=CR_DEV_USERNAME" >> "$GITHUB_OUTPUT"
            echo "container-registry=${{ vars.CR_DEV_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "Invalid lifecycle type. Supported types are: \`deployment\`, and \`development\`" >> "$GITHUB_STEP_SUMMARY"
          fi

  run-spring-boot-build:
    needs: input-checks
    if: inputs.application-type == 'spring-boot'
    uses: felleslosninger/github-workflows/.github/workflows/ci-spring-boot-build-publish-image.yml@PF-2417-sanitize-composite-actions
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      image-name: ${{ inputs.image-name }}
      image-pack: ${{ inputs.image-pack }}
      image-pack-tag: ${{ inputs.image-pack-tag }}
      image-signing: ${{ inputs.image-signing }}
      image-tag: ${{ inputs.image-tag }}
      java-version: ${{ inputs.java-version }}
      java-distribution: ${{ inputs.java-distribution }}
      slack-channel-id: ${{ inputs.slack-channel-id }}
      application-path: ${{ inputs.application-path }}
      cache-path: ${{ inputs.cache-path }}
      update-versions: ${{ inputs.update-versions }}
      container-registry: ${{ needs.input-checks.outputs.container-registry }}
      sp-container-registry-client-id: ${{ needs.input-checks.outputs.sp-container-registry-client-id }}
      module-name: ${{ inputs.module-name }}
      trivy-library-disable-scan: ${{ inputs.trivy-library-disable-scan }}
      trivy-library-ignore-unfixed: ${{ inputs.trivy-library-ignore-unfixed }}
      trivy-library-severity: ${{ inputs.trivy-library-severity }}
      trivy-os-disable-scan: ${{ inputs.trivy-os-disable-scan }}
      trivy-os-ignore-unfixed: ${{ inputs.trivy-os-ignore-unfixed }}
      trivy-os-severity: ${{ inputs.trivy-os-severity }}
      trivy-version: ${{ inputs.trivy-version }}
    secrets: inherit

  run-quarkus-build:
    needs: input-checks
    if: inputs.application-type == 'quarkus'
    uses: felleslosninger/github-workflows/.github/workflows/ci-quarkus-build-publish-image.yml@main
    permissions:
      contents: write
      id-token: write
    with:
      image-name: ${{ inputs.image-name }}
      image-pack: ${{ inputs.image-pack }}
      image-pack-tag: ${{ inputs.image-pack-tag }}
      image-signing: ${{ inputs.image-signing }}
      java-version: ${{ inputs.java-version }}
      java-distribution: ${{ inputs.java-distribution }}
      slack-channel-id: ${{ inputs.slack-channel-id }}
      cache-path: ${{ inputs.cache-path }}
      native: ${{ inputs.native }}
      container-registry: ${{ needs.input-checks.outputs.container-registry }}
      sp-container-registry-client-id: ${{ needs.input-checks.outputs.sp-container-registry-client-id }}
      trivy-library-disable-scan: ${{ inputs.trivy-library-disable-scan }}
      trivy-library-ignore-unfixed: ${{ inputs.trivy-library-ignore-unfixed }}
      trivy-library-severity: ${{ inputs.trivy-library-severity }}
      trivy-os-disable-scan: ${{ inputs.trivy-os-disable-scan }}
      trivy-os-ignore-unfixed: ${{ inputs.trivy-os-ignore-unfixed }}
      trivy-os-severity: ${{ inputs.trivy-os-severity }}
      trivy-version: ${{ inputs.trivy-version }}
    secrets: inherit

  run-docker-build:
    needs: input-checks
    if: inputs.application-type == 'docker'
    uses: felleslosninger/github-workflows/.github/workflows/ci-docker-build-publish-image.yml@main
    permissions:
      contents: write
      id-token: write
    with:
      image-name: ${{ inputs.image-name }}
      image-signing: ${{ inputs.image-signing }}
      slack-channel-id: ${{ inputs.slack-channel-id }}
      application-path: ${{ inputs.application-path }}
      add-git-package-token: ${{ inputs.add-git-package-token }}
      container-registry: ${{ needs.input-checks.outputs.container-registry }}
      sp-container-registry-client-id: ${{ needs.input-checks.outputs.sp-container-registry-client-id }}
      trivy-library-disable-scan: ${{ inputs.trivy-library-disable-scan }}
      trivy-library-ignore-unfixed: ${{ inputs.trivy-library-ignore-unfixed }}
      trivy-library-severity: ${{ inputs.trivy-library-severity }}
      trivy-os-disable-scan: ${{ inputs.trivy-os-disable-scan }}
      trivy-os-ignore-unfixed: ${{ inputs.trivy-os-ignore-unfixed }}
      trivy-os-severity: ${{ inputs.trivy-os-severity }}
      trivy-version: ${{ inputs.trivy-version }}
    secrets: inherit
