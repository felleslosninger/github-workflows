# 1. Verifies PR title
# 2. Builds and runs application
# 3. Scans image with Trivy
# 4. Auto-merges Dependabot PRs (optional)

name: PR Checks

permissions: {}

on:
  workflow_call:
    inputs:
      application-type:
        type: string
        required: true
      enable-auto-merge-dependabot:
        type: boolean
        default: false
      enable-pr-title-verify:
        type: boolean
        default: true
      enable-trivy-image-scan:
        type: boolean
        default: true
      java-version:
        default: "21"
        required: false
        type: string
      java-distribution:
        description: Java distribution to use
        default: "liberica"
        required: false
        type: string
      image-name:
        description: Name of Docker image
        required: false
        type: string
      image-pack:
        description: Paketo builder image to use. See https://paketo.io/docs/reference/builders-reference/ for choices
        default: builder-noble-java-tiny
        required: false
        type: string
      image-pack-tag:
        description: "Docker image pack version tag. Earlier pinned to 0.0.440 due to lifecycle 0.21.2 regression (see: paketo-buildpacks/builder-noble-java-tiny#191). Now fixed: https://github.com/paketo-buildpacks/builder-noble-java-tiny/issues/191#issuecomment-3897508140"
        default: "latest"
        required: false
        type: string
      auto-merge-types:
        type: string
      pull-request-title:
        type: string
        required: true
      pull-request-allowed-prefixes:
        type: string
        required: true
      pull-request-min-length-title:
        type: number
        required: false
        default: 10
      pull-request-max-length-title:
        type: number
        required: false
        default: 100
      pull-request-case-sensitive-prefix:
        type: boolean
        required: false
        default: true
      artifact-name:
        type: string
        required: false
      artifact-path:
        type: string
        required: false
      native:
        required: false
        type: boolean
        default: false
      cache-path:
        default: "**/pom.xml"
        required: false
        type: string
      maven-lifecycle:
        description: 'Maven lifecycle phase (test, package, verify, install)'
        type: string
        required: false
        default: 'test'
      application-path:
        default: "./"
        required: false
        type: string
      module-name:
        description: 'Name of the module to build and scan (for multi-module projects)'
        type: string
        required: false
        default: ''
      trivy-library-disable-scan:
        description: Disable Trivy library scan
        type: boolean
        required: false
        default: false
      trivy-library-ignore-unfixed:
        description: Ignore unfixed vulnerabilities in Trivy library scan
        type: boolean
        required: false
        default: true
      trivy-library-severity:
        description: When to fail the scan with Trivy library vulnerabilities
        type: string
        required: false
        default: 'HIGH,CRITICAL'
      trivy-os-disable-scan:
        description: Disable Trivy OS scan
        type: boolean
        required: false
        default: false
      trivy-os-ignore-unfixed:
        description: Ignore unfixed vulnerabilities in Trivy OS scan
        type: boolean
        required: false
        default: true
      trivy-os-severity:
        description: When to fail the scan with Trivy OS vulnerabilities
        type: string
        required: false
        default: 'CRITICAL'
      trivy-version:
        description: Version of Trivy to use for scanning
        type: string
        required: false
        default: ''

jobs:
  verify-pull-request-title:
    if: |
      inputs.enable-pr-title-verify == true &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        id: check-pr-title
        uses: felleslosninger/github-actions/validate-pull-request-title@d7888fecafbf48e5845c8a0c76389f71c517ee6d # pin@v0.8.0
        with:
          pull-request-title: ${{ inputs.pull-request-title }}
          allowed-prefixes: ${{ inputs.pull-request-allowed-prefixes }}
          min-length-title: ${{ inputs.pull-request-min-length-title }}
          max-length-title: ${{ inputs.pull-request-max-length-title }}
          case-sensitive-prefix: ${{ inputs.pull-request-case-sensitive-prefix }}

      - name: Write inputs to summary
        uses: felleslosninger/github-workflows/.github/actions/json-to-summary@main
        with:
          json-payload: ${{ toJson(inputs) }}

      - name: Fail if PR title is not valid
        if: steps.check-pr-title.outputs.is-valid == 'false'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # pin@v9.0.0
        with:
          script: |
            core.setFailed('${{ steps.check-pr-title.outputs.error-message }}')

  build-and-test-java:
    if: |
      inputs.application-type == 'spring-boot' ||
      inputs.application-type == 'quarkus'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6.0.2

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # pin@v5.2.0
        with:
          distribution: "${{ inputs.java-distribution }}"
          java-version: ${{ inputs.java-version }}
          cache: maven
          cache-dependency-path: ${{ inputs.cache-path }}
          server-id: github
          server-username: MAVEN_USER
          server-password: MAVEN_PASSWORD

      - name: Run mvn ${{ inputs.maven-lifecycle }}
        env:
          MAVEN_USER: ${{ secrets.MAVEN_USER }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          LIFECYCLE="${{ inputs.maven-lifecycle }}"
          case "$LIFECYCLE" in
            test|package|verify|install)
              mvn -B "$LIFECYCLE"
              ;;
            *)
              echo "Invalid Maven lifecycle: $LIFECYCLE"
              exit 1
              ;;
          esac

      - name: Upload artifact
        if: |
          !cancelled() &&
          inputs.artifact-path != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # pin@v7.0.1
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.artifact-path }}

  call-spring-boot-container-scan:
    name: Call Spring Boot container scan
    if: |
      inputs.enable-trivy-image-scan == true &&
      inputs.application-type == 'spring-boot'
    uses: felleslosninger/github-workflows/.github/workflows/ci-spring-boot-container-scan.yml@PF-2384-node24-upgrade
    permissions:
      contents: read
    with:
      image-name: ${{ inputs.image-name }}
      image-pack: ${{ inputs.image-pack }}
      image-pack-tag: ${{ inputs.image-pack-tag }}
      java-version: ${{ inputs.java-version }}
      application-path: ${{ inputs.application-path }}
      module-name: ${{ inputs.module-name }}
      trivy-library-disable-scan: ${{ inputs.trivy-library-disable-scan }}
      trivy-library-ignore-unfixed: ${{ inputs.trivy-library-ignore-unfixed }}
      trivy-library-severity: ${{ inputs.trivy-library-severity }}
      trivy-os-disable-scan: ${{ inputs.trivy-os-disable-scan }}
      trivy-os-ignore-unfixed: ${{ inputs.trivy-os-ignore-unfixed }}
      trivy-os-severity: ${{ inputs.trivy-os-severity }}
      trivy-version: ${{ inputs.trivy-version }}
    secrets: inherit

  call-quarkus-container-scan:
    name: Call Quarkus container scan
    if: |
      inputs.enable-trivy-image-scan == true &&
      inputs.application-type == 'quarkus'
    uses: felleslosninger/github-workflows/.github/workflows/ci-quarkus-container-scan.yml@PF-2384-node24-upgrade
    permissions:
      contents: read
    with:
      image-name: ${{ inputs.image-name }}
      image-pack: ${{ inputs.image-pack }}
      image-pack-tag: ${{ inputs.image-pack-tag }}
      java-version: ${{ inputs.java-version }}
      native: ${{ inputs.native }}
      application-path: ${{ inputs.application-path }}
      trivy-library-disable-scan: ${{ inputs.trivy-library-disable-scan }}
      trivy-library-ignore-unfixed: ${{ inputs.trivy-library-ignore-unfixed }}
      trivy-library-severity: ${{ inputs.trivy-library-severity }}
      trivy-os-disable-scan: ${{ inputs.trivy-os-disable-scan }}
      trivy-os-ignore-unfixed: ${{ inputs.trivy-os-ignore-unfixed }}
      trivy-os-severity: ${{ inputs.trivy-os-severity }}
      trivy-version: ${{ inputs.trivy-version }}
    secrets: inherit

  call-auto-merge:
    name: Call auto-merge
    if: |
      always() &&
      inputs.enable-auto-merge-dependabot == true &&
      (needs.build-and-test-java.result == 'success' || needs.build-and-test-java.result == 'skipped') &&
      (needs.call-spring-boot-container-scan.result == 'success' || needs.call-spring-boot-container-scan.result == 'skipped') &&
      (needs.call-quarkus-container-scan.result == 'success' || needs.call-quarkus-container-scan.result == 'skipped')
    needs:
      [
        build-and-test-java,
        call-spring-boot-container-scan,
        call-quarkus-container-scan,
      ]
    uses: felleslosninger/github-workflows/.github/workflows/misc-approve-and-merge-dependabot-pr.yml@PF-2384-node24-upgrade
    permissions:
      contents: write
      pull-requests: write
    with:
      update-types: ${{ inputs.auto-merge-types }}
    secrets: inherit

  call-build-image:
    name: Call build image
    if: needs.call-auto-merge.outputs.merged == 'true'
    runs-on: ubuntu-latest
    needs: call-auto-merge
    steps:
      - name: call-build-publish-image
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # pin@v4.0.1
        with:
          event-type: build-publish-image
